<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender Jadwal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.15);
    --text: #1A1916;
    --text-muted: #7A7772;
    --text-faint: #B5B2AC;
    --radius: 10px;
    --radius-lg: 16px;

    --konten-bg: #E8F2FF; --konten-border: #3B82F6; --konten-text: #1D4ED8;
    --teknologi-bg: #ECFDF5; --teknologi-border: #10B981; --teknologi-text: #065F46;
    --manajemen-bg: #FFF7ED; --manajemen-border: #F59E0B; --manajemen-text: #92400E;
    --komunikasi-bg: #F5F3FF; --komunikasi-border: #8B5CF6; --komunikasi-text: #5B21B6;
    --desain-bg: #FFF1F2; --desain-border: #F43F5E; --desain-text: #9F1239;
    --keuangan-bg: #ECFEFF; --keuangan-border: #06B6D4; --keuangan-text: #164E63;
    --default-bg: #F4F4F5; --default-border: #A1A1AA; --default-text: #3F3F46;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .brand {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #3B82F6;
  }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border-md);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--border-md); }
  .nav-btn.today { font-weight: 500; }

  .month-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    min-width: 160px;
    text-align: center;
    letter-spacing: -0.02em;
  }

  .legend {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .legend-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  /* ── LAYOUT ── */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 56px);
  }

  /* ── CALENDAR ── */
  .cal-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
    border-right: 1px solid var(--border);
  }

  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 10px 0;
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .day-label.weekend { color: var(--text-faint); }

  .weeks {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .week-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    min-height: 110px;
    flex: 1;
    border-bottom: 1px solid var(--border);
  }
  .week-row:last-child { border-bottom: none; }

  .day-cell {
    border-right: 1px solid var(--border);
    padding: 8px 6px 6px;
    min-height: 100px;
    transition: background .1s;
    cursor: default;
  }
  .day-cell:last-child { border-right: none; }
  .day-cell:hover { background: var(--bg); }
  .day-cell.other-month { background: #FAFAF9; }
  .day-cell.other-month .day-num { color: var(--text-faint); }
  .day-cell.weekend .day-num { color: var(--text-muted); }
  .day-cell.today .day-num-inner {
    background: #1A1916;
    color: #fff;
    border-radius: 50%;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }

  .day-num {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
  }
  .day-num-inner { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }

  .event-pill {
    font-size: 10.5px;
    padding: 2px 7px 2px 5px;
    border-radius: 4px;
    margin-bottom: 2px;
    cursor: pointer;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
    border-left: 3px solid transparent;
    transition: filter .15s, transform .1s;
    line-height: 1.6;
  }
  .event-pill:hover { filter: brightness(.95); transform: translateX(1px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-today-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .sidebar-date {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.2;
  }
  .sidebar-day {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
  }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-faint);
    margin-bottom: 8px;
    margin-top: 4px;
  }

  .sidebar-event {
    padding: 10px 12px;
    border-radius: var(--radius);
    margin-bottom: 7px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: filter .15s;
  }
  .sidebar-event:hover { filter: brightness(.97); }
  .sidebar-event-title {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 3px;
    line-height: 1.4;
  }
  .sidebar-event-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .sidebar-event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .no-events {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.6;
  }
  .no-events-icon { font-size: 28px; margin-bottom: 8px; opacity: .5; }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,25,22,.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
    padding: 24px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    width: 480px;
    max-width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    animation: modal-in .18s ease;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-top {
    padding: 22px 22px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .modal-top h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    padding-right: 32px;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .modal-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid transparent;
    letter-spacing: .01em;
  }

  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--border); }

  .modal-body {
    padding: 18px 22px;
  }

  .detail-section {
    margin-bottom: 18px;
  }
  .detail-section:last-child { margin-bottom: 0; }

  .detail-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-faint);
    margin-bottom: 5px;
  }
  .detail-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }
  .detail-value a { color: #3B82F6; text-decoration: none; }
  .detail-value a:hover { text-decoration: underline; }

  .time-row {
    display: flex;
    gap: 16px;
  }
  .time-block {
    flex: 1;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .time-block .tl { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
  .time-block .tv { font-size: 13px; font-weight: 500; color: var(--text); }
  .time-block .td { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .members-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .member-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .member-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    flex-shrink: 0;
    object-fit: cover;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    overflow: hidden;
  }
  .member-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .member-info-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .member-info-email { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .desc-box {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--text);
    white-space: pre-line;
    line-height: 1.7;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── LOADING ── */
  .loading-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-size: 13px;
    gap: 10px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--text-muted);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-dot"></span>
    Kalender Jadwal
  </div>
  <div class="header-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <button class="nav-btn today" onclick="goToday()">Hari ini</button>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    <span class="month-label" id="month-label"></span>
  </div>
  <div class="legend" id="legend"></div>
</header>

<div class="main-layout">
  <div class="cal-wrap">
    <div class="day-labels">
      <div class="day-label weekend">Min</div>
      <div class="day-label">Sen</div>
      <div class="day-label">Sel</div>
      <div class="day-label">Rab</div>
      <div class="day-label">Kam</div>
      <div class="day-label">Jum</div>
      <div class="day-label weekend">Sab</div>
    </div>
    <div class="weeks" id="weeks">
      <div class="loading-state"><div class="spinner"></div> Memuat data jadwal...</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-today-label">Hari ini</div>
      <div class="sidebar-date" id="sidebar-date"></div>
      <div class="sidebar-day" id="sidebar-day"></div>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <div class="no-events"><div class="no-events-icon">📅</div>Memuat...</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-top">
      <h2 id="modal-title"></h2>
      <div class="modal-tags" id="modal-tags"></div>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbw990hsHmPgNmx2xziOlwhthNwHHSd_Xmlb5T-08DjMvucfaEjIzE0fnkonMq59mtEC/exec";

// Warna per Tim — tambahkan tim baru di sini
const TEAM_COLORS = {
  "Konten":      { bg: "#E8F2FF", border: "#3B82F6", text: "#1D4ED8" },
  "Teknologi":   { bg: "#ECFDF5", border: "#10B981", text: "#065F46" },
  "Manajemen":   { bg: "#FFF7ED", border: "#F59E0B", text: "#92400E" },
  "Komunikasi":  { bg: "#F5F3FF", border: "#8B5CF6", text: "#5B21B6" },
  "Desain":      { bg: "#FFF1F2", border: "#F43F5E", text: "#9F1239" },
  "Keuangan":    { bg: "#ECFEFF", border: "#06B6D4", text: "#164E63" },
};
const DEFAULT_COLOR = { bg: "#F4F4F5", border: "#A1A1AA", text: "#3F3F46" };

// Data sampel fallback jika API tidak dapat diakses
const SAMPLE_DATA = [
  {
    ID: 958,
    Title: "Annual Plan and CBEC with UNESCO-ICHEI",
    Kategori: "Undangan",
    Tim: "Konten",
    Deskripsi: "Topic: Meeting with ICE Institute on Annual Plan and CBEC\nJoin Zoom Meeting\nhttps://us06web.zoom.us/j/84436270654\nMeeting ID: 844 3627 0654",
    Mulai: "2026-04-22T03:00:00Z",
    Akhir: "2026-04-22T03:00:00Z",
    Anggota: [
      { DisplayName: "Rahayu Dwi Riyanti", Email: "rahayudr@icei.ac.id", Picture: "https://uppdji.sharepoint.com/sites/iceinstituteinternal/_layouts/15/UserPhoto.aspx?Size=L&AccountName=rahayudr@icei.ac.id" },
      { DisplayName: "Eka Julianti", Email: "ekajulianti@icei.ac.id", Picture: "" },
      { DisplayName: "Musowwir Lubis", Email: "L.musowwir@icei.ac.id", Picture: "" },
      { DisplayName: "Raesita Rakhmawati Rosadi", Email: "raesita@icei.ac.id", Picture: "" },
      { DisplayName: "Roihatul Millah", Email: "millah@icei.ac.id", Picture: "" }
    ]
  }
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let events = [];
const today = new Date();
let curYear = today.getFullYear();
let curMonth = today.getMonth();

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function getColor(tim) {
  return TEAM_COLORS[tim] || DEFAULT_COLOR;
}

function initials(name) {
  if (!name) return "?";
  return name.split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase();
}

function formatDate(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  return d.toLocaleDateString("id-ID", {
    weekday: "long", day: "numeric", month: "long", year: "numeric",
    timeZone: "Asia/Jakarta"
  });
}

function formatTime(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  return d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit", timeZone: "Asia/Jakarta" }) + " WIB";
}

function descToHtml(text) {
  if (!text) return "-";
  const urlReg = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlReg, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}

function eventsForDate(y, m, d) {
  return events.filter(ev => {
    const dt = new Date(ev.Mulai);
    return dt.getUTCFullYear() === y && dt.getUTCMonth() === m && dt.getUTCDate() === d;
  });
}

// ─────────────────────────────────────────────
//  DATA FETCH
// ─────────────────────────────────────────────
async function fetchEvents() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);

    const resJson = await res.json();

    if (resJson.status === "success" && Array.isArray(resJson.data)) {
      events = resJson.data;
    } else {
      throw new Error("Format data tidak valid");
    }

    if (events.length === 0) events = SAMPLE_DATA;

  } catch (e) {
    console.warn("API tidak dapat diakses:", e.message);
    events = SAMPLE_DATA;
  }

  renderAll();
}

// ─────────────────────────────────────────────
//  RENDER CALENDAR
// ─────────────────────────────────────────────
function renderCalendar() {
  document.getElementById("month-label").textContent =
    new Date(curYear, curMonth, 1).toLocaleDateString("id-ID", { month: "long", year: "numeric" });

  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const daysInPrev = new Date(curYear, curMonth, 0).getDate();

  let cells = [];
  for (let i = firstDay - 1; i >= 0; i--) {
    const pm = curMonth === 0 ? 11 : curMonth - 1;
    const py = curMonth === 0 ? curYear - 1 : curYear;
    cells.push({ d: daysInPrev - i, m: pm, y: py, other: true });
  }
  for (let d = 1; d <= daysInMonth; d++) cells.push({ d, m: curMonth, y: curYear, other: false });
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1];
    const nm = curMonth === 11 ? 0 : curMonth + 1;
    const ny = curMonth === 11 ? curYear + 1 : curYear;
    cells.push({ d: last.d + 1, m: nm, y: ny, other: true });
  }

  const weeksEl = document.getElementById("weeks");
  weeksEl.innerHTML = "";

  for (let w = 0; w < cells.length / 7; w++) {
    const row = document.createElement("div");
    row.className = "week-row";

    for (let i = 0; i < 7; i++) {
      const c = cells[w * 7 + i];
      const isToday = !c.other && c.y === today.getFullYear() && c.m === today.getMonth() && c.d === today.getDate();
      const isWeekend = (i === 0 || i === 6);

      const cell = document.createElement("div");
      cell.className = "day-cell" +
        (c.other ? " other-month" : "") +
        (isToday ? " today" : "") +
        (isWeekend ? " weekend" : "");

      const numWrap = document.createElement("div");
      numWrap.className = "day-num";
      const numInner = document.createElement("span");
      numInner.className = "day-num-inner";
      numInner.textContent = c.d;
      numWrap.appendChild(numInner);
      cell.appendChild(numWrap);

      const evs = eventsForDate(c.y, c.m, c.d);
      evs.forEach(ev => {
        const col = getColor(ev.Tim);
        const pill = document.createElement("div");
        pill.className = "event-pill";
        pill.style.background = col.bg;
        pill.style.color = col.text;
        pill.style.borderLeftColor = col.border;
        pill.title = ev.Title;
        pill.textContent = ev.Title;
        pill.addEventListener("click", e => { e.stopPropagation(); openModal(ev); });
        cell.appendChild(pill);
      });

      row.appendChild(cell);
    }
    weeksEl.appendChild(row);
  }

  renderLegend();
}

// ─────────────────────────────────────────────
//  RENDER LEGEND
// ─────────────────────────────────────────────
function renderLegend() {
  const usedTeams = [...new Set(events.map(e => e.Tim).filter(Boolean))];
  const legendEl = document.getElementById("legend");
  legendEl.innerHTML = usedTeams.slice(0, 6).map(tim => {
    const col = getColor(tim);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${col.border}"></div>
      ${tim}
    </div>`;
  }).join("");
}

// ─────────────────────────────────────────────
//  RENDER SIDEBAR
// ─────────────────────────────────────────────
function renderSidebar() {
  const now = new Date();

  document.getElementById("sidebar-date").textContent =
    now.toLocaleDateString("id-ID", { day: "numeric", month: "long" });
  document.getElementById("sidebar-day").textContent =
    now.toLocaleDateString("id-ID", { weekday: "long", year: "numeric" });

  const todayEvs = eventsForDate(now.getFullYear(), now.getMonth(), now.getDate());
  const listEl = document.getElementById("sidebar-list");

  if (todayEvs.length === 0) {
    listEl.innerHTML = `<div class="no-events">
      <div class="no-events-icon">🗓️</div>
      Tidak ada jadwal<br>untuk hari ini
    </div>`;
    return;
  }

  listEl.innerHTML = `<div class="sidebar-section-label">${todayEvs.length} Kegiatan</div>`;

  todayEvs.forEach(ev => {
    const col = getColor(ev.Tim);
    const item = document.createElement("div");
    item.className = "sidebar-event";
    item.style.background = col.bg;
    item.style.borderLeftColor = col.border;
    item.innerHTML = `
      <div class="sidebar-event-title" style="color:${col.text}">${ev.Title}</div>
      <div class="sidebar-event-meta">
        <span class="sidebar-event-dot" style="background:${col.border}"></span>
        ${formatTime(ev.Mulai)} &bull; ${ev.Tim || ev.Kategori || "-"}
      </div>`;
    item.addEventListener("click", () => openModal(ev));
    listEl.appendChild(item);
  });
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(ev) {
  const col = getColor(ev.Tim);

  document.getElementById("modal-title").textContent = ev.Title;

  const tagsEl = document.getElementById("modal-tags");
  tagsEl.innerHTML = "";
  if (ev.Tim) {
    const t = document.createElement("span");
    t.className = "tag";
    t.style.background = col.bg;
    t.style.color = col.text;
    t.style.borderColor = col.border;
    t.textContent = ev.Tim;
    tagsEl.appendChild(t);
  }
  if (ev.Kategori && ev.Kategori !== ev.Tim) {
    const k = document.createElement("span");
    k.className = "tag";
    k.style.background = "var(--surface2)";
    k.style.color = "var(--text-muted)";
    k.style.borderColor = "var(--border-md)";
    k.textContent = ev.Kategori;
    tagsEl.appendChild(k);
  }

  const members = (ev.Anggota || []).map(a => {
    const hasImg = a.Picture && !a.Picture.includes("sharepoint");
    return `<div class="member-row">
      <div class="member-avatar">
        ${hasImg
          ? `<img src="${a.Picture}" alt="${a.DisplayName}" onerror="this.parentElement.textContent='${initials(a.DisplayName)}'" />`
          : initials(a.DisplayName)}
      </div>
      <div>
        <div class="member-info-name">${a.DisplayName || "-"}</div>
        <div class="member-info-email">${a.Email || ""}</div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("modal-body").innerHTML = `
    <div class="detail-section">
      <div class="time-row">
        <div class="time-block">
          <div class="tl">Mulai</div>
          <div class="tv">${formatTime(ev.Mulai)}</div>
          <div class="td">${formatDate(ev.Mulai)}</div>
        </div>
        <div class="time-block">
          <div class="tl">Selesai</div>
          <div class="tv">${formatTime(ev.Akhir)}</div>
          <div class="td">${formatDate(ev.Akhir)}</div>
        </div>
      </div>
    </div>

    ${ev.Deskripsi ? `
    <div class="detail-section">
      <div class="detail-label">Deskripsi</div>
      <div class="desc-box">${descToHtml(ev.Deskripsi)}</div>
    </div>` : ""}

    ${members ? `
    <div class="detail-section">
      <div class="detail-label">Anggota (${(ev.Anggota||[]).length})</div>
      <div class="members-grid">${members}</div>
    </div>` : ""}
  `;

  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("overlay")) closeModal();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  else if (curMonth < 0) { curMonth = 11; curYear--; }
  renderAll();
}

function goToday() {
  curYear = today.getFullYear();
  curMonth = today.getMonth();
  renderAll();
}

function renderAll() {
  renderCalendar();
  renderSidebar();
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
fetchEvents();
</script>
</body>
</html>
