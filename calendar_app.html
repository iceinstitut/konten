<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender ICE Institute</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="https://iceinstitut.github.io/image/aset/favicon_icei.png" type="image/png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.15);
    --text: #1A1916;
    --text-muted: #7A7772;
    --text-faint: #B5B2AC;
    --radius: 10px;
    --radius-lg: 16px;
    --accent: #3B82F6;
    --today-bg: #1A1916;
    --today-color: #fff;
    --selected-bg: #EEF4FF;
    --selected-outline: #3B82F6;

    --konten-bg: #E8F2FF; --konten-border: #3B82F6; --konten-text: #1D4ED8;
    --teknologi-bg: #ECFDF5; --teknologi-border: #10B981; --teknologi-text: #065F46;
    --manajemen-bg: #FFF7ED; --manajemen-border: #F59E0B; --manajemen-text: #92400E;
    --komunikasi-bg: #F5F3FF; --komunikasi-border: #8B5CF6; --komunikasi-text: #5B21B6;
    --desain-bg: #FFF1F2; --desain-border: #F43F5E; --desain-text: #9F1239;
    --keuangan-bg: #ECFEFF; --keuangan-border: #06B6D4; --keuangan-text: #164E63;
    --default-bg: #F4F4F5; --default-border: #A1A1AA; --default-text: #3F3F46;
  }

  /* ── DARK MODE ── */
  [data-theme="dark"] {
    --bg: #111110;
    --surface: #1C1C1A;
    --surface2: #262624;
    --border: rgba(255,255,255,0.08);
    --border-md: rgba(255,255,255,0.14);
    --text: #EEECEA;
    --text-muted: #8C8986;
    --text-faint: #555350;
    --today-bg: #EEECEA;
    --today-color: #111110;
    --selected-bg: #1A2540;
    --selected-outline: #60A5FA;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #111110;
      --surface: #1C1C1A;
      --surface2: #262624;
      --border: rgba(255,255,255,0.08);
      --border-md: rgba(255,255,255,0.14);
      --text: #EEECEA;
      --text-muted: #8C8986;
      --text-faint: #555350;
      --today-bg: #EEECEA;
      --today-color: #111110;
      --selected-bg: #1A2540;
      --selected-outline: #60A5FA;
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .brand {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #3B82F6;
  }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border-md);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--border-md); }
  .nav-btn.today { font-weight: 500; }

  .month-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    min-width: 160px;
    text-align: center;
    letter-spacing: -0.02em;
  }

  .legend {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .legend-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  /* ── LAYOUT ── */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 56px);
  }

  /* ── CALENDAR ── */
  .cal-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
    border-right: 1px solid var(--border);
  }

  /* ── MOBILE BOTTOM SHEET ── */
  .mobile-sheet-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,25,22,.35);
    z-index: 100;
    backdrop-filter: blur(1px);
  }
  .mobile-sheet-backdrop.open { display: block; }

  .mobile-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    z-index: 101;
    max-height: 75vh;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    box-shadow: 0 -4px 40px rgba(0,0,0,.14);
  }
  .mobile-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border-md);
    border-radius: 99px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }
  .sheet-header {
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sheet-date-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-faint);
    margin-bottom: 2px;
  }
  .sheet-date-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .sheet-body {
    overflow-y: auto;
    padding: 10px 14px 24px;
    flex: 1;
  }

  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 10px 0;
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .day-label.weekend { color: var(--text-faint); }

  .weeks {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .week-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    min-height: 110px;
    flex: 1;
    border-bottom: 1px solid var(--border);
  }
  .week-row:last-child { border-bottom: none; }

  .day-cell {
    border-right: 1px solid var(--border);
    padding: 8px 6px 6px;
    min-height: 100px;
    transition: background .1s;
    cursor: pointer;
  }
  .day-cell:last-child { border-right: none; }
  .day-cell:hover { background: var(--bg); }
  .day-cell.other-month { background: var(--surface2); opacity: .7; }
  .day-cell.other-month .day-num { color: var(--text-faint); }
  .day-cell.weekend .day-num { color: var(--text-muted); }
  .day-cell.today .day-num-inner {
    background: var(--today-bg);
    color: var(--today-color);
    border-radius: 50%;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .day-cell.selected { background: var(--selected-bg) !important; }
  .day-cell.selected .day-num-inner {
    outline: 2px solid var(--selected-outline);
    outline-offset: 1px;
    border-radius: 50%;
  }
  .day-cell.today.selected .day-num-inner {
    background: var(--selected-outline);
    color: #fff;
    outline: none;
  }

  .day-num {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
  }
  .day-num-inner { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }

  .event-pill {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: 2px;
    cursor: pointer;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
    border-left: 3px solid transparent;
    transition: filter .15s, transform .1s;
    line-height: 1.6;
  }
  .event-pill:hover { filter: brightness(.95); transform: translateX(1px); }

  .more-pill {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    text-align: left;
    transition: background .12s, color .12s;
    line-height: 1.4;
    user-select: none;
  }
  .more-pill:hover {
    background: var(--surface2);
    color: var(--text);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-today-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .sidebar-date {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.2;
  }
  .sidebar-day {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
  }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-faint);
    margin-bottom: 8px;
    margin-top: 4px;
  }

  .sidebar-event {
    padding: 10px 12px;
    border-radius: var(--radius);
    margin-bottom: 7px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: filter .15s;
  }
  .sidebar-event:hover { filter: brightness(.97); }
  .sidebar-event-title {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 3px;
    line-height: 1.4;
  }
  .sidebar-event-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .sidebar-event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .no-events {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.6;
  }
  .no-events-icon { font-size: 28px; margin-bottom: 8px; opacity: 1; }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,25,22,.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
    padding: 24px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    width: 480px;
    max-width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    animation: modal-in .18s ease;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-top {
    padding: 22px 22px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .modal-top h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    padding-right: 32px;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .modal-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid transparent;
    letter-spacing: .01em;
  }

  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--border); }

  .modal-body {
    padding: 18px 22px;
  }

  .detail-section {
    margin-bottom: 18px;
  }
  .detail-section:last-child { margin-bottom: 0; }

  .detail-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-faint);
    margin-bottom: 5px;
  }
  .detail-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }
  .detail-value a { color: #3B82F6; text-decoration: none; }
  .detail-value a:hover { text-decoration: underline; }

  .time-row {
    display: flex;
    gap: 16px;
  }
  .time-block {
    flex: 1;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .time-block .tl { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
  .time-block .tv { font-size: 13px; font-weight: 500; color: var(--text); }
  .time-block .td { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .members-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .member-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .member-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    flex-shrink: 0;
    object-fit: cover;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    overflow: hidden;
  }
  .member-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .member-info-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .member-info-email { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .desc-box {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--text);
    white-space: pre-line;
    line-height: 1.7;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── LOADING ── */
  .loading-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-size: 13px;
    gap: 10px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--text-muted);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── DARK MODE TOGGLE ── */
  .theme-toggle {
    background: none;
    border: 1px solid var(--border-md);
    border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 15px;
    color: var(--text-muted);
    transition: background .15s, color .15s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { background: var(--surface2); color: var(--text); }

  /* ── ERROR BANNER ── */
  .error-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: #FFFBEB;
    border-bottom: 1px solid #FDE68A;
    color: #92400E;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 20px;
    position: relative;
    z-index: 40;
  }
  [data-theme="dark"] .error-banner {
    background: #2A2310;
    border-bottom-color: #4A3A10;
    color: #FBD04A;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .error-banner {
      background: #2A2310;
      border-bottom-color: #4A3A10;
      color: #FBD04A;
    }
  }
  .error-banner.show { display: flex; }
  .error-banner-icon { font-size: 14px; flex-shrink: 0; }
  .error-banner-close {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    opacity: .6;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: opacity .15s;
  }
  .error-banner-close:hover { opacity: 1; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 99px; }

  /* ── RESPONSIVE MOBILE ── */
  @media (max-width: 768px) {
    header {
      padding: 0 14px;
      height: 52px;
      gap: 8px;
    }

    .brand { font-size: 13px; }

    .legend { display: none; }

    .month-label {
      font-size: 13px;
      min-width: 110px;
    }

    .nav-btn {
      padding: 5px 9px;
      font-size: 12px;
    }

    .main-layout {
      height: calc(100vh - 52px);
    }

    /* Sembunyikan sidebar desktop di mobile */
    .sidebar { display: none; }

    .cal-wrap { border-right: none; }

    .day-label {
      font-size: 9px;
      padding: 7px 0;
      letter-spacing: .03em;
    }

    .week-row { min-height: 72px; }

    .day-cell {
      padding: 5px 3px 4px;
      min-height: 60px;
    }

    .day-num { font-size: 11px; }
    .day-num-inner { width: 20px; height: 20px; font-size: 10px; }

    .day-cell.today .day-num-inner {
      width: 20px; height: 20px;
    }

    .event-pill {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      line-height: 1.5;
    }
  }

  @media (max-width: 480px) {
    .month-label { min-width: 90px; font-size: 12px; }
    .week-row { min-height: 60px; }
    .day-cell { min-height: 52px; padding: 4px 2px 3px; }
    .event-pill { font-size: 8px; padding: 1px 4px; }
  }
</style>
</head>
<body>

<header role="banner">
  <div class="brand" aria-label="Kalender Jadwal">
    <span class="brand-dot" aria-hidden="true" style="display: none;"></span><img src="https://iceinstitut.github.io/image/aset/favicon_icei.png">
    Kalender ICE Institute
  </div>
  <div class="header-nav" role="navigation" aria-label="Navigasi bulan">
    <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Bulan sebelumnya">&#8249;</button>
    <button class="nav-btn today" onclick="goToday()" aria-label="Kembali ke hari ini">Hari ini</button>
    <button class="nav-btn" onclick="changeMonth(1)" aria-label="Bulan berikutnya">&#8250;</button>
    <span class="month-label" id="month-label" aria-live="polite" aria-atomic="true"></span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="legend" id="legend" role="list" aria-label="Legenda tim"></div>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Ganti tema gelap/terang" title="Ganti tema">🌙</button>
  </div>
</header>

<!-- Error Banner -->
<div class="error-banner" id="error-banner" role="alert" aria-live="polite">
  <span class="error-banner-icon" aria-hidden="true">⚠️</span>
  <span>Menampilkan data contoh — koneksi ke server gagal.</span>
  <button class="error-banner-close" onclick="document.getElementById('error-banner').classList.remove('show')" aria-label="Tutup notifikasi">&#10005;</button>
</div>

<div class="main-layout">
  <div class="cal-wrap" role="main">
    <div class="day-labels" role="row" aria-label="Hari dalam minggu">
      <div class="day-label weekend" role="columnheader" abbr="Minggu">Min</div>
      <div class="day-label" role="columnheader" abbr="Senin">Sen</div>
      <div class="day-label" role="columnheader" abbr="Selasa">Sel</div>
      <div class="day-label" role="columnheader" abbr="Rabu">Rab</div>
      <div class="day-label" role="columnheader" abbr="Kamis">Kam</div>
      <div class="day-label" role="columnheader" abbr="Jumat">Jum</div>
      <div class="day-label weekend" role="columnheader" abbr="Sabtu">Sab</div>
    </div>
    <div class="weeks" id="weeks" role="grid" aria-label="Grid kalender">
      <div class="loading-state"><div class="spinner" aria-hidden="true"></div> Memuat data jadwal...</div>
    </div>
  </div>

// ─────────────────────────────────────────────
//  THEME (DARK MODE)
// ─────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem("theme");
  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const theme = saved || (prefersDark ? "dark" : "light");
  applyTheme(theme);
})();

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
  btn && btn.setAttribute("aria-label", theme === "dark" ? "Ganti ke tema terang" : "Ganti ke tema gelap");
}

function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme") || "light";
  const next = current === "dark" ? "light" : "dark";
  localStorage.setItem("theme", next);
  applyTheme(next);
}
let events          = [];
let _normCache      = [];   // OPTIMASI: cache normalizeEvent — dihitung sekali setelah fetch
let _rowCache       = {};   // OPTIMASI: cache assignEventRows
const today         = new Date();
let curYear         = today.getFullYear();
let curMonth        = today.getMonth();
let selectedDate    = null; // { y, m, d }
const MAX_PILLS     = 3;    // maks pill per sel sebelum "+X lagi"

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function getColor(tim) {
  return TEAM_COLORS[tim] || DEFAULT_COLOR;
}

function initials(name) {
  if (!name) return "?";
  return name.split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase();
}

function formatDate(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  return d.toLocaleDateString("id-ID", {
    weekday: "long", day: "numeric", month: "long", year: "numeric",
    timeZone: "Asia/Jakarta"
  });
}

function formatTime(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  return d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit", timeZone: "Asia/Jakarta" }) + " WIB";
}

function descToHtml(text) {
  if (!text) return "-";
  const urlReg = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlReg, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}

function eventsForDate(y, m, d) {
  return events.filter(ev => {
    const dt = new Date(ev.Mulai);
    return dt.getUTCFullYear() === y && dt.getUTCMonth() === m && dt.getUTCDate() === d;
  });
}

// ─────────────────────────────────────────────
//  DATA FETCH
// ─────────────────────────────────────────────
async function fetchEvents() {
  let usingSampleData = false;
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const resJson = await res.json();
    if (resJson.status === "success" && Array.isArray(resJson.data)) {
      events = resJson.data;
    } else {
      throw new Error("Format data tidak valid");
    }
    if (events.length === 0) { events = SAMPLE_DATA; usingSampleData = true; }
  } catch (e) {
    console.warn("API tidak dapat diakses:", e.message);
    events = SAMPLE_DATA;
    usingSampleData = true;
  }

  // Tampilkan error banner jika pakai data sampel
  if (usingSampleData) {
    const banner = document.getElementById("error-banner");
    if (banner) banner.classList.add("show");
  }

  // OPTIMASI: normalisasi & row-assignment sekali saja setelah data masuk
  _normCache = events.map(normalizeEvent);
  _rowCache  = assignEventRows(_normCache);

  renderAll();
}

// PERBAIKAN UTAMA: Multi-day event seperti Google Calendar

function normalizeEvent(ev) {
  const start = new Date(ev.Mulai);
  const end   = new Date(ev.Akhir || ev.Mulai);
  const s = new Date(start.toLocaleString("en-US", { timeZone: "Asia/Jakarta" }));
  const e = new Date(end.toLocaleString("en-US", { timeZone: "Asia/Jakarta" }));
  return { ...ev, _start: s, _end: e };
}

function isSameDay(d1, d2) {
  return d1.getFullYear() === d2.getFullYear() &&
         d1.getMonth()    === d2.getMonth()    &&
         d1.getDate()     === d2.getDate();
}

function isBetween(date, start, end) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const s = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const e = new Date(end.getFullYear(), end.getMonth(), end.getDate());
  return d >= s && d <= e;
}

// OPTIMASI: gunakan _normCache yang sudah dihitung, bukan map ulang
function eventsForDateRange(y, m, d) {
  const date = new Date(y, m, d);
  return _normCache.filter(ev => isBetween(date, ev._start, ev._end));
}

// assignEventRows menerima array normalized (sudah di-normalize di luar)
function assignEventRows(normalizedEvs) {
  const sorted = [...normalizedEvs].sort((a, b) => a._start - b._start);
  const rows = {};
  sorted.forEach(ev => {
    let row = 0;
    while (true) {
      const conflict = sorted.some(other => {
        if (other.ID === ev.ID) return false;
        if (rows[other.ID] !== row) return false;
        return !(ev._end < other._start || ev._start > other._end);
      });
      if (!conflict) break;
      row++;
    }
    rows[ev.ID] = row;
  });
  return rows;
}


// ─────────────────────────────────────────────
//  RENDER CALENDAR
// ─────────────────────────────────────────────
function renderCalendar() {
  document.getElementById("month-label").textContent =
    new Date(curYear, curMonth, 1).toLocaleDateString("id-ID", { month: "long", year: "numeric" });

  const firstDay    = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const daysInPrev  = new Date(curYear, curMonth, 0).getDate();

  const cells = [];

  // prev month filler
  for (let i = firstDay - 1; i >= 0; i--) {
    const pm = curMonth === 0 ? 11 : curMonth - 1;
    const py = curMonth === 0 ? curYear - 1 : curYear;
    cells.push({ d: daysInPrev - i, m: pm, y: py, other: true });
  }
  // current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ d, m: curMonth, y: curYear, other: false });
  }
  // next month filler
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1];
    const nm = curMonth === 11 ? 0 : curMonth + 1;
    const ny = curMonth === 11 ? curYear + 1 : curYear;
    cells.push({ d: last.d + 1, m: nm, y: ny, other: true });
  }

  const weeksEl = document.getElementById("weeks");
  weeksEl.innerHTML = "";

  // OPTIMASI: gunakan cache, bukan recalculate
  const normalizedEvs = _normCache;
  const eventRowsMap  = _rowCache;

  // ── LOOP PER MINGGU ──
  for (let w = 0; w < cells.length / 7; w++) {
    const weekCells = cells.slice(w * 7, w * 7 + 7);

    const weekEvents = normalizedEvs.filter(ev =>
      weekCells.some(c => isBetween(new Date(c.y, c.m, c.d), ev._start, ev._end))
    );

    const weekMaxRow  = Math.max(...weekEvents.map(ev => eventRowsMap[ev.ID] || 0), 0);

    // tinggi dinamis: MAX_PILLS baris + ruang "+X lagi"
    const visibleRows = Math.min(weekMaxRow + 1, MAX_PILLS);
    const stackHeight = Math.max(60, visibleRows * 26 + (weekMaxRow >= MAX_PILLS ? 20 : 0));

    const rowEl = document.createElement("div");
    rowEl.className = "week-row";

    // ── LOOP PER HARI ──
    for (let i = 0; i < 7; i++) {
      const idx = w * 7 + i;
      const c   = cells[idx];

      const cell = document.createElement("div");
      let cls = "day-cell";
      if (c.other)          cls += " other-month";
      if (i === 0 || i === 6) cls += " weekend";
      if (!c.other && c.y === today.getFullYear() && c.m === today.getMonth() && c.d === today.getDate())
        cls += " today";
      if (selectedDate && c.y === selectedDate.y && c.m === selectedDate.m && c.d === selectedDate.d)
        cls += " selected";
      cell.className = cls;

      // Aksesibilitas: label tanggal untuk screen reader
      const dateObj = new Date(c.y, c.m, c.d);
      const dayEvCount = _normCache.filter(ev => isBetween(dateObj, ev._start, ev._end)).length;
      cell.setAttribute("role", "gridcell");
      cell.setAttribute("tabindex", "0");
      cell.setAttribute("aria-label",
        dateObj.toLocaleDateString("id-ID", { weekday:"long", day:"numeric", month:"long", year:"numeric" }) +
        (dayEvCount > 0 ? `, ${dayEvCount} kegiatan` : ", tidak ada kegiatan")
      );

      // keyboard: Enter / Space untuk memilih hari
      cell.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectDay(c.y, c.m, c.d); }
      });

      // klik hari → sidebar / bottom sheet
      cell.addEventListener("click", (e) => {
        if (e.target.classList.contains("event-pill") ||
            e.target.classList.contains("more-pill")) return;
        selectDay(c.y, c.m, c.d);
      });

      // nomor tanggal
      const num = document.createElement("div");
      num.className = "day-num";
      num.innerHTML = `<span class="day-num-inner">${c.d}</span>`;
      cell.appendChild(num);

      // container event (absolute positioning)
      const stack = document.createElement("div");
      stack.style.cssText = `position:relative;height:${stackHeight}px`;

      // Kumpulkan event yang mulai di hari ini di minggu ini
      let pillCount = 0;
      const hiddenEvs = [];

      normalizedEvs.forEach(ev => {
        const startIdx = cells.findIndex(c2 => isSameDay(new Date(c2.y, c2.m, c2.d), ev._start));
        if (idx !== startIdx) return; // render hanya di hari pertama

        const endIdx  = cells.findIndex(c2 => isSameDay(new Date(c2.y, c2.m, c2.d), ev._end));
        const rowIndex = eventRowsMap[ev.ID] || 0;
        const span     = Math.min((endIdx < 0 ? cells.length - 1 : endIdx) - startIdx + 1, 7 - i);

        // FITUR "+X lagi": sembunyikan pill jika melebihi MAX_PILLS
        if (rowIndex >= MAX_PILLS) {
          hiddenEvs.push(ev);
          return;
        }

        const col  = getColor(ev.Tim);
        const pill = document.createElement("div");
        pill.className = "event-pill";
        pill.style.cssText = `
          position:absolute;
          top:${rowIndex * 26}px;
          left:0;
          width:calc(${span * 100}% + ${span - 1}px);
          z-index:5;
          background:${col.bg};
          color:${col.text};
          border-left-color:${col.border};
        `;
        pill.textContent = ev.Title;
        pill.onclick = (e) => { e.stopPropagation(); openModal(ev); };
        stack.appendChild(pill);
        pillCount++;
      });

      // Render "+X lagi" jika ada event tersembunyi
      if (hiddenEvs.length > 0) {
        const more = document.createElement("div");
        more.className = "more-pill";
        more.style.cssText = `
          position:absolute;
          bottom:2px;
          left:2px;
          right:2px;
          z-index:6;
        `;
        more.textContent = `+${hiddenEvs.length} lagi`;
        more.onclick = (e) => { e.stopPropagation(); selectDay(c.y, c.m, c.d); };
        stack.appendChild(more);
      }

      cell.appendChild(stack);
      rowEl.appendChild(cell);
    }

    weeksEl.appendChild(rowEl);
  }

  renderLegend();
}


// ─────────────────────────────────────────────
//  RENDER LEGEND
// ─────────────────────────────────────────────
function renderLegend() {
  const usedTeams = [...new Set(events.map(e => e.Tim).filter(Boolean))];
  const legendEl = document.getElementById("legend");
  legendEl.innerHTML = usedTeams.slice(0, 6).map(tim => {
    const col = getColor(tim);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${col.border}"></div>
      ${tim}
    </div>`;
  }).join("");
}

// ─────────────────────────────────────────────
//  SELECT DAY
// ─────────────────────────────────────────────
function selectDay(y, m, d) {
  selectedDate = { y, m, d };

  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    openSheet(y, m, d);
  } else {
    renderSidebar(y, m, d);
  }

  // Update visual selected tanpa re-render penuh
  document.querySelectorAll(".day-cell.selected").forEach(el => el.classList.remove("selected"));
  // Re-render diperlukan karena cell ada di DOM yang dibangun ulang tiap renderCalendar
  renderCalendar();
}

function openSheet(y, m, d) {
  const date      = new Date(y, m, d);
  const dateLabel = date.toLocaleDateString("id-ID", { weekday: "long" });
  const dateTitle = date.toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" });

  const labelEl = document.getElementById("sheet-date-label");
  const titleEl = document.getElementById("sheet-date-title");
  const bodyEl  = document.getElementById("sheet-body");
  const backdropEl = document.getElementById("sheet-backdrop");
  const sheetEl = document.getElementById("mobile-sheet");

  if (!labelEl || !titleEl || !bodyEl || !backdropEl || !sheetEl) return;

  labelEl.textContent = dateLabel;
  titleEl.textContent = dateTitle;

  _renderEventList(bodyEl, y, m, d, (ev) => { closeSheet(); openModal(ev); });

  backdropEl.classList.add("open");
  sheetEl.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeSheet() {
  const backdropEl = document.getElementById("sheet-backdrop");
  const sheetEl    = document.getElementById("mobile-sheet");
  if (backdropEl) backdropEl.classList.remove("open");
  if (sheetEl)    sheetEl.classList.remove("open");
  document.body.style.overflow = "";
}

// ─────────────────────────────────────────────
//  RENDER SIDEBAR (dinamis per tanggal dipilih)
// ─────────────────────────────────────────────
function renderSidebar(y, m, d) {
  // Guard: elemen sidebar mungkin null di mobile (meski tetap di DOM, defensive check)
  const labelEl  = document.getElementById("sidebar-today-label");
  const dateEl   = document.getElementById("sidebar-date");
  const dayEl    = document.getElementById("sidebar-day");
  const listEl   = document.getElementById("sidebar-list");
  if (!labelEl || !dateEl || !dayEl || !listEl) return;

  const useDate = (y !== undefined) ? new Date(y, m, d) : new Date();
  const uy = useDate.getFullYear();
  const um = useDate.getMonth();
  const ud = useDate.getDate();

  const isToday = uy === today.getFullYear() && um === today.getMonth() && ud === today.getDate();

  labelEl.textContent = isToday ? "Hari ini" : "Dipilih";
  dateEl.textContent  = useDate.toLocaleDateString("id-ID", { day: "numeric", month: "long" });
  dayEl.textContent   = useDate.toLocaleDateString("id-ID", { weekday: "long", year: "numeric" });

  _renderEventList(listEl, uy, um, ud, (ev) => openModal(ev));
}

// Helper bersama: render daftar event ke dalam container
function _renderEventList(container, y, m, d, onClickEv) {
  const dayEvs = eventsForDateRange(y, m, d);
  container.innerHTML = "";

  if (dayEvs.length === 0) {
    container.innerHTML = `<div class="no-events">
      <div class="no-events-icon"><img src="https://iceinstitut.github.io/image/aset/olli_noevent.png" alt="no_event" width="100%" loading="lazy"></div>
      Tidak ada jadwal<br>untuk hari ini
    </div>`;
    return;
  }

  const label = document.createElement("div");
  label.className = "sidebar-section-label";
  label.textContent = `${dayEvs.length} Kegiatan`;
  container.appendChild(label);

  dayEvs.forEach(ev => {
    const col  = getColor(ev.Tim);
    const item = document.createElement("div");
    item.className = "sidebar-event";
    item.style.background      = col.bg;
    item.style.borderLeftColor = col.border;
    item.innerHTML = `
      <div class="sidebar-event-title" style="color:${col.text}">${ev.Title}</div>
      <div class="sidebar-event-meta">
        <span class="sidebar-event-dot" style="background:${col.border}"></span>
        ${formatTime(ev.Mulai)} &bull; ${ev.Tim || ev.Kategori || "-"}
      </div>`;
    item.addEventListener("click", () => onClickEv(ev));
    container.appendChild(item);
  });
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(ev) {
  const col = getColor(ev.Tim);

  document.getElementById("modal-title").textContent = ev.Title;

  const tagsEl = document.getElementById("modal-tags");
  tagsEl.innerHTML = "";
  if (ev.Tim) {
    const t = document.createElement("span");
    t.className = "tag";
    t.style.background = col.bg;
    t.style.color = col.text;
    t.style.borderColor = col.border;
    t.textContent = ev.Tim;
    tagsEl.appendChild(t);
  }
  if (ev.Kategori && ev.Kategori !== ev.Tim) {
    const k = document.createElement("span");
    k.className = "tag";
    k.style.background = "var(--surface2)";
    k.style.color = "var(--text-muted)";
    k.style.borderColor = "var(--border-md)";
    k.textContent = ev.Kategori;
    tagsEl.appendChild(k);
  }

  const members = (ev.Anggota || []).map(a => {
    const hasImg = a.Picture && !a.Picture.includes("sharepoint");
    return `<div class="member-row">
      <div class="member-avatar">
        ${hasImg
          ? `<img src="${a.Picture}" alt="${a.DisplayName}" onerror="this.parentElement.textContent='${initials(a.DisplayName)}'" />`
          : initials(a.DisplayName)}
      </div>
      <div>
        <div class="member-info-name">${a.DisplayName || "-"}</div>
        <div class="member-info-email">${a.Email || ""}</div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("modal-body").innerHTML = `
    <div class="detail-section">
      <div class="time-row">
        <div class="time-block">
          <div class="tl">Mulai</div>
          <div class="tv">${formatTime(ev.Mulai)}</div>
          <div class="td">${formatDate(ev.Mulai)}</div>
        </div>
        <div class="time-block">
          <div class="tl">Selesai</div>
          <div class="tv">${formatTime(ev.Akhir)}</div>
          <div class="td">${formatDate(ev.Akhir)}</div>
        </div>
      </div>
    </div>

    ${ev.Deskripsi ? `
    <div class="detail-section">
      <div class="detail-label">Deskripsi</div>
      <div class="desc-box">${descToHtml(ev.Deskripsi)}</div>
    </div>` : ""}

    ${members ? `
    <div class="detail-section">
      <div class="detail-label">Anggota (${(ev.Anggota||[]).length})</div>
      <div class="members-grid">${members}</div>
    </div>` : ""}
  `;

  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
  // Aksesibilitas: set focus ke tombol tutup saat modal terbuka
  setTimeout(() => {
    const closeBtn = document.querySelector(".modal-close");
    if (closeBtn) closeBtn.focus();
  }, 50);
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("overlay")) closeModal();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeModal(); closeSheet(); }

  // Focus trap untuk modal
  if (e.key === "Tab" && document.getElementById("overlay").classList.contains("open")) {
    const modal = document.getElementById("modal");
    const focusable = modal.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])');
    const first = focusable[0];
    const last  = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }
});

// Touch swipe down untuk tutup bottom sheet
(function() {
  let startY = 0;
  const sheet = document.getElementById("mobile-sheet");
  sheet.addEventListener("touchstart", e => { startY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener("touchend", e => {
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 80) closeSheet();
  }, { passive: true });
})();

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  else if (curMonth < 0) { curMonth = 11; curYear--; }
  renderAll();
}

function goToday() {
  curYear = today.getFullYear();
  curMonth = today.getMonth();
  selectedDate = null;
  renderAll();
}

function renderAll() {
  renderCalendar();
  if (selectedDate) {
    renderSidebar(selectedDate.y, selectedDate.m, selectedDate.d);
  } else {
    renderSidebar(); // default: hari ini
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
fetchEvents();
</script>
